name: Validate & Release

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]

jobs:
  # ── HACS Validation ──────────────────────────────────────────────────────────
  hacs-validate:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration

  # ── Hassfest (HA integration validation) ────────────────────────────────────
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate with hassfest
        uses: home-assistant/actions/hassfest@master

  # ── Auto Release when tag is pushed ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [hacs-validate, hassfest]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create release zip
        run: |
          zip -r ha_optimizer.zip custom_components/ha_optimizer/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ha_optimizer.zip
          generate_release_notes: true
          body: |
            ## 🧹 HA Optimizer ${{ github.ref_name }}

            ### Installation via HACS
            1. Add this repository as a custom repository in HACS
            2. Install **HA Optimizer**
            3. Restart Home Assistant
            4. Go to Settings → Devices & Services → Add Integration → HA Optimizer

            ### Manual Installation
            Download `ha_optimizer.zip`, extract and copy `ha_optimizer/` into `config/custom_components/`.
